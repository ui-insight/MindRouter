# nginx vhost fronting the video worker (mirrors the FLUX Klein / inference
# node proxy pattern). Large artifacts + long renders → generous body size and
# read timeout; buffering off so poll/health aren't delayed behind a fetch.
#
# Place in the node's nginx conf.d and reload.
server {
    listen 18300 ssl;
    server_name _;

    # ssl_certificate / ssl_certificate_key: use the node's existing certs.

    client_max_body_size 128m;

    location / {
        proxy_pass http://127.0.0.1:18301;   # uvicorn bound to loopback
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_read_timeout 900s;   # a fetch of a large MP4 may run a while
        proxy_send_timeout 900s;
        proxy_buffering off;       # stream content; keep /health + poll snappy
    }
}
