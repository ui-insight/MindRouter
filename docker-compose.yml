services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - DATABASE_URL=mysql+pymysql://mindrouter:${MYSQL_PASSWORD:-mindrouter_password}@127.0.0.1:3306/mindrouter
      - REDIS_URL=redis://127.0.0.1:6379/0
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - ARTIFACT_STORAGE_PATH=/data/artifacts
      - CHAT_FILES_PATH=/data/chat_files
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}
      - AZURE_AD_CLIENT_ID=${AZURE_AD_CLIENT_ID:-}
      - AZURE_AD_CLIENT_SECRET=${AZURE_AD_CLIENT_SECRET:-}
      - AZURE_AD_TENANT_ID=${AZURE_AD_TENANT_ID:-}
      - AZURE_AD_REDIRECT_URI=${AZURE_AD_REDIRECT_URI:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - APP_BASE_URL=${APP_BASE_URL:-https://mindrouter.uidaho.edu}
      - ARCHIVE_DATABASE_URL=mysql+pymysql://mindrouter_archive:${MYSQL_ARCHIVE_PASSWORD:-archive_password}@127.0.0.1:3307/mindrouter_archive
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-mindrouter}
    volumes:
      - artifact_data:/data/artifacts
      - chat_data:/data/chat_files
      - ./backend:/app/backend:ro
    depends_on:
      mariadb:
        condition: service_healthy
      mariadb-archive:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mariadb:
    image: mariadb:11.2
    network_mode: host
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=mindrouter
      - MYSQL_USER=mindrouter
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-mindrouter_password}
      - MYSQL_TCP_PORT=3306
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./mariadb/custom.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  mariadb-archive:
    image: mariadb:11.2
    network_mode: host
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ARCHIVE_ROOT_PASSWORD:-archive_root_password}
      - MYSQL_DATABASE=mindrouter_archive
      - MYSQL_USER=mindrouter_archive
      - MYSQL_PASSWORD=${MYSQL_ARCHIVE_PASSWORD:-archive_password}
      - MYSQL_TCP_PORT=3307
    volumes:
      - mariadb_archive_data:/var/lib/mysql
      - ./mariadb/archive.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized", "--port=3307"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    network_mode: host
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    command: redis-server --appendonly yes --port 6379

  # Mock Ollama backend for development/testing
  mock-ollama:
    build:
      context: .
      dockerfile: Dockerfile.mock
    network_mode: host
    environment:
      - MOCK_ENGINE=ollama
      - MOCK_PORT=11434
    profiles:
      - dev

  # Mock vLLM backend for development/testing
  mock-vllm:
    build:
      context: .
      dockerfile: Dockerfile.mock
    network_mode: host
    environment:
      - MOCK_ENGINE=vllm
      - MOCK_PORT=8001
    profiles:
      - dev

  # GPU sidecar agent for per-GPU hardware metrics
  gpu-sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile.sidecar
    network_mode: host
    environment:
      - GPU_AGENT_PORT=8007
      - GPU_AGENT_HOST=0.0.0.0
      - SIDECAR_SECRET_KEY=${SIDECAR_SECRET_KEY}
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  mariadb_data:
  mariadb_archive_data:
  redis_data:
  artifact_data:
  chat_data:
